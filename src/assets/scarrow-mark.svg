      <stop stop-color="#14532d"/>
      <stop offset="0.55" stop-color="#166534"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <!-- Same geometry as white shield — plant is clipped to this interior -->
