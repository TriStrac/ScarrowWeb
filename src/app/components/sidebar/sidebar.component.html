<aside class="sidebar" aria-label="Main navigation">
  <div class="sidebar__inner">
    <header class="sidebar__header">
      <a routerLink="/dashboard" class="sidebar__brand" aria-label="Scarrow home">
        <img src="assets/scarrow-final_logo.png" alt="" class="sidebar__logo" width="88" />
        <span class="sidebar__brand-name">Scarrow</span>
      </a>
    </header>

    <p class="sidebar__section-label" id="nav-primary-label">Menu</p>
    <nav class="sidebar__nav" aria-labelledby="nav-primary-label">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" [routerLinkActiveOptions]="{ exact: true }">
        <span class="nav-item__icon-wrap" aria-hidden="true">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span class="nav-item__label">Dashboard</span>
      </a>

      <a routerLink="/organization" routerLinkActive="active" class="nav-item">
        <span class="nav-item__icon-wrap" aria-hidden="true">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M6 22V9l6-4 6 4v13" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M10 22v-6h4v6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span class="nav-item__label">Organization</span>
      </a>

      <a routerLink="/messages" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="nav-item">
        <span class="nav-item__icon-wrap" aria-hidden="true">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M4 6h16v10H8l-4 4V6Z" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span class="nav-item__label">Messages</span>
      </a>
    </nav>
  </div>

  <footer class="sidebar__footer">
    <p class="sidebar__section-label sidebar__section-label--footer" id="nav-account-label">Account</p>
    <div class="sidebar__account" role="group" aria-labelledby="nav-account-label">
      <a routerLink="/profile" routerLinkActive="active" class="account-action account-action--profile">
        <span class="account-action__avatar" aria-hidden="true">
          <svg class="account-action__avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M20 21a8 8 0 1 0-16 0" stroke-linecap="round" />
            <circle cx="12" cy="9" r="4" />
          </svg>
        </span>
        <span class="account-action__text">Profile</span>
      </a>
      <button type="button" class="account-action account-action--logout" (click)="openLogoutConfirm()">
        <span class="account-action__icon-wrap" aria-hidden="true">
          <svg class="account-action__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M15 12H4" stroke-linecap="round" />
            <path d="M10 7 5 12l5 5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M20 5v14" stroke-linecap="round" />
          </svg>
        </span>
        <span class="account-action__text">Log out</span>
      </button>
    </div>
  </footer>
</aside>

@if (showLogoutConfirm) {
  <div
    class="logout-overlay"
    role="presentation"
    (click)="cancelLogout()"
  ></div>
  <div
    class="logout-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="logout-dialog-title"
    aria-describedby="logout-dialog-desc"
  >
    <h2 id="logout-dialog-title" class="logout-dialog__title">Log out?</h2>
    <p id="logout-dialog-desc" class="logout-dialog__desc">You will need to sign in again to access your account.</p>
    <div class="logout-dialog__actions">
      <button type="button" class="btn btn--secondary" (click)="cancelLogout()">Cancel</button>
      <button type="button" class="btn btn--danger" (click)="confirmLogout()">Log out</button>
    </div>
  </div>
}
