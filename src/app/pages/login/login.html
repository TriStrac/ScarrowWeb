<div class="login-container">
  <div class="background-wrapper" aria-hidden="true">
    <img src="assets/bg.jpg" class="bg-image" alt="" />
    <svg xmlns="http://www.w3.org/2000/svg" class="bg-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <path
        d="M520.876 0H1920V1080H0H395.897L646.301 1045.05C679.449 1040.42 710.905 1027.55 737.789 1007.62L751.471 997.47C802.341 959.745 832.338 900.156 832.338 836.824V815.217C832.338 771.297 846.795 728.598 873.477 693.712L932.765 616.197C977.993 557.064 986.634 477.704 955.192 410.223L936.611 370.346C910.193 313.647 851.962 278.7 789.501 282.058L689.295 287.445C614.95 291.442 564.514 213.005 598.999 147.022V147.022C624.451 98.3242 603.944 38.2385 554.031 15.2621L520.876 0Z"
        fill="#F9EDDD"
      />
    </svg>
  </div>

  <div class="login-form-wrapper">
    <div class="login-card">
      <form class="login-form" (ngSubmit)="submitLogin()" novalidate>
        <div class="login-brand">
          <div class="login-brand__mark">
            <img
              src="assets/scarrow-final_logo.png"
              alt=""
              class="logo"
              width="400"
              height="206"
            />
            <h1 class="login-app-name">Scarrow</h1>
          </div>
          <header class="login-card__header">
            <h2 class="login-card__title" id="login-form-heading">Sign in</h2>
            <p class="login-card__lead">
              Use your account credentials. You’ll confirm with a one-time code next.
            </p>
          </header>
        </div>

        @if (loginError) {
          <div class="login-alert" role="alert">{{ loginError }}</div>
        }

        <div class="field field--float">
          <input
            id="login-username"
            class="field__input field__input--float"
            type="text"
            name="username"
            [(ngModel)]="username"
            autocomplete="username"
            placeholder=" "
            [attr.aria-invalid]="loginError ? true : null"
          />
          <label class="field__label field__label--float" for="login-username">Username</label>
        </div>

        <div class="field field--float">
          <input
            id="login-password"
            class="field__input field__input--float"
            type="password"
            name="password"
            [(ngModel)]="password"
            autocomplete="current-password"
            placeholder=" "
            [attr.aria-invalid]="loginError ? true : null"
          />
          <label class="field__label field__label--float" for="login-password">Password</label>
        </div>

        <div class="login-form__row">
          <label class="login-check">
            <input type="checkbox" class="login-check__input" name="remember" />
            <span class="login-check__text">Remember this device</span>
          </label>
          <a class="login-link" href="#" (click)="$event.preventDefault()">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login-submit">Continue</button>
      </form>
    </div>
  </div>

  <app-modal [isOpen]="showOtpModal" title="Two-factor verification" (close)="onOtpModalClose()">
    <div class="otp-modal-inner">
      <p class="otp-modal-lead">
        Enter the 6-digit code sent to <strong>{{ maskedPhone }}</strong> for <strong>{{ displayUsername }}</strong>
      </p>

      @if (otpError) {
        <div class="otp-alert" role="alert">{{ otpError }}</div>
      }

      <div class="otp-row" (paste)="onOtpPaste($event)">
        @for (i of otpIndices; track i) {
          <input
            #otpInput
            type="text"
            inputmode="numeric"
            maxlength="1"
            autocomplete="one-time-code"
            class="otp-box"
            [class.otp-box-active]="otpFocusIndex === i"
            [ngModel]="otpDigits[i]"
            (ngModelChange)="onOtpDigit($event, i)"
            (keydown)="onOtpKeydown($event, i)"
            (focus)="otpFocusIndex = i"
          />
        }
      </div>

      <button type="button" class="btn-otp-verify" (click)="verifyAndLogin()">Verify &amp; continue</button>

      <div class="otp-modal-actions">
        <button type="button" class="btn-otp-secondary" (click)="resendCode()">Resend code</button>
      </div>
    </div>
  </app-modal>
</div>
